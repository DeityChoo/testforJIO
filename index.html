<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Благотворительный фонд</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Благотворительное пожертвование</h2>

    <label>Email</label>
    <input type="email" id="email">

    <label>Телефон</label>
    <input type="tel" id="phone">

    <label>ФИО</label>
    <input type="text" id="name">

    <label>Комментарий</label>
    <textarea id="comment"></textarea>

    <label>
        <input type="checkbox" id="recurrent">
        Сделать платёж ежемесячным
    </label>

    <br><br>

    <button id="checkout">Оплатить</button>

    <script>
        var widget = new cp.CloudPayments();

        document.querySelector('#checkout').onclick = function() {
            widget.start({
                publicId: 'pk_8f2b672d45ba2887ad7471e4c5a7f',
                description: 'Пожертвование',
                amount: 100,
                currency: 'RUB',
                invoiceId: 'donation_' + Date.now(),
                accountId: document.getElementById('email').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                data: {
                    CloudPayments: {
                        recurrent: document.getElementById('recurrent').checked 
                            ? { interval: 'Month', period: 1 } 
                            : null
                    }
                }
            });
        };
    </script>

</body>
</html>
