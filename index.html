<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Благотворительный фонд</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
</head>
<body>

    <h2>Благотворительное пожертвование</h2>

    <label>Email</label>
    <input type="email" id="email"><br><br>

    <label>Телефон</label>
    <input type="tel" id="phone"><br><br>

    <label>ФИО</label>
    <input type="text" id="name"><br><br>

    <label>Комментарий</label>
    <textarea id="comment"></textarea><br><br>

    <label>
        <input type="checkbox" id="recurrent">
        Сделать платёж ежемесячным
    </label><br><br>

    <button id="checkout">Оплатить</button>

    <script>
        function start() {
            var widget = new cp.CloudPayments();
            widget.start({
                publicId: 'pk_8f2b672d45ba2887ad7471e4c5a7f',
                description: 'Пожертвование',
                amount: 100,
                currency: 'RUB',
                invoiceId: 'donation_' + Date.now(),
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                data: {
                    CloudPayments: {
                        recurrent: document.getElementById('recurrent').checked 
                            ? { interval: 'Month', period: 1 } 
                            : null
                    }
                }
            });
        }

        document.querySelector('#checkout').onclick = start;
    </script>

</body>
</html>
