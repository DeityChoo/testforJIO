<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Благотворительный фонд «Сердце» — Помощь детям</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #fdf2f4 0%, #f0f4ff 40%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Декоративный фон */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 182, 182, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(167, 200, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.06),
                0 2px 8px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            padding: 40px 36px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Иконка сердца */
        .heart-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.3);
        }

        .heart-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .amount-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .amount-btn {
            flex: 1;
            min-width: 70px;
            padding: 12px 8px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }

        .amount-btn:hover {
            border-color: #f43f5e;
            background: #fff1f2;
        }

        .amount-btn.active {
            border-color: #f43f5e;
            background: #fff1f2;
            color: #e11d48;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.15);
        }

        .custom-amount {
            flex: 1.5;
            min-width: 100px;
            padding: 12px 12px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            font-family: inherit;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .custom-amount:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.1);
        }

        .custom-amount.active {
            border-color: #f43f5e;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
            color: #1e293b;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #94a3b8;
            background: white;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .recurrent-block {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 14px;
            margin: 22px 0;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            transition: all 0.2s;
        }

        .recurrent-block:hover {
            border-color: #cbd5e1;
        }

        .recurrent-block input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #f43f5e;
            cursor: pointer;
            flex-shrink: 0;
        }

        .recurrent-block .recurrent-text {
            font-size: 14px;
            color: #334155;
            line-height: 1.4;
        }

        .recurrent-block .recurrent-text strong {
            color: #e11d48;
        }

        .donate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.35);
            margin-top: 6px;
        }

        .donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(244, 63, 94, 0.45);
            background: linear-gradient(135deg, #fb7185, #f43f5e);
        }

        .donate-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(244, 63, 94, 0.3);
        }

        .secure-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 12px;
        }

        .secure-note svg {
            width: 14px;
            height: 14px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
                border-radius: 24px;
            }
            h1 {
                font-size: 22px;
            }
            .amount-btn {
                padding: 10px 6px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Иконка сердца -->
        <div class="heart-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>

        <h1>Помогите детям</h1>
        <p class="subtitle">Ваше пожертвование поможет обеспечить лечение и заботу детям, которые в этом нуждаются</p>

        <!-- Выбор суммы -->
        <div class="amount-selector">
            <button class="amount-btn" data-amount="100">100 ₽</button>
            <button class="amount-btn" data-amount="300">300 ₽</button>
            <button class="amount-btn active" data-amount="500">500 ₽</button>
            <button class="amount-btn" data-amount="1000">1 000 ₽</button>
            <input type="number" class="custom-amount" placeholder="Своя" min="1">
        </div>

        <!-- Форма данных -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ivan@example.com">
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="phone" placeholder="+7 900 123-45-67">
        </div>

        <div class="form-group">
            <label>ФИО</label>
            <input type="text" id="name" placeholder="Иванов Иван Иванович">
        </div>

        <div class="form-group">
            <label>Комментарий (необязательно)</label>
            <textarea id="comment" placeholder="По желанию укажите назначение платежа..."></textarea>
        </div>

        <!-- Ежемесячный платёж -->
        <label class="recurrent-block">
            <input type="checkbox" id="recurrent">
            <span class="recurrent-text">Сделать платёж <strong>ежемесячным</strong><br><small>Средства будут списываться раз в месяц</small></span>
        </label>

        <!-- Кнопка оплаты -->
        <button class="donate-btn" id="checkout">💖 Пожертвовать</button>

        <!-- Безопасность -->
        <div class="secure-note">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            </svg>
            Безопасный платёж через CloudPayments
        </div>
    </div>

    <script>
        var widget = new cp.CloudPayments();

        // Обработчик выбора суммы
        var amountButtons = document.querySelectorAll('.amount-btn');
        var customAmountInput = document.querySelector('.custom-amount');
        var selectedAmount = 500; // По умолчанию 500 руб.

        amountButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                amountButtons.forEach(function(b) { b.classList.remove('active'); });
                customAmountInput.classList.remove('active');
                customAmountInput.value = '';
                btn.classList.add('active');
                selectedAmount = parseInt(btn.getAttribute('data-amount'));
            });
        });

        customAmountInput.addEventListener('focus', function() {
            amountButtons.forEach(function(b) { b.classList.remove('active'); });
            customAmountInput.classList.add('active');
            selectedAmount = parseInt(customAmountInput.value) || 0;
        });

        customAmountInput.addEventListener('input', function() {
            var val = parseInt(customAmountInput.value);
            if (!isNaN(val) && val > 0) {
                selectedAmount = val;
                amountButtons.forEach(function(b) { b.classList.remove('active'); });
                customAmountInput.classList.add('active');
            }
        });

        // Запуск виджета по клику
        document.querySelector('#checkout').onclick = function() {
            if (selectedAmount <= 0) {
                alert('Пожалуйста, выберите или введите сумму пожертвования.');
                return;
            }

            widget.start({
                publicId: 'pk_8f2b672d45ba2887ad7471e4c5a7f',
                description: 'Благотворительное пожертвование',
                amount: selectedAmount,
                currency: 'RUB',
                invoiceId: 'donation_' + Date.now(),
                accountId: document.getElementById('email').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                data: {
                    CloudPayments: {
                        recurrent: document.getElementById('recurrent').checked
                            ? { interval: 'Month', period: 1 }
                            : null
                    }
                }
            });
        };
    </script>

</body>
</html>
