<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Благотворительный фонд</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(160deg, #fdf2f4 0%, #f0f4ff 40%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 40px 36px;
        }

        .heart-icon {
            width: 56px;
            height: 56px;
            background: #f43f5e;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .heart-icon span {
            font-size: 28px;
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .amount-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .amount-btn {
            flex: 1;
            min-width: 70px;
            padding: 12px 8px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
        }

        .amount-btn:hover {
            border-color: #f43f5e;
            background: #fff1f2;
        }

        .amount-btn.active {
            border-color: #f43f5e;
            background: #fff1f2;
            color: #e11d48;
        }

        .custom-amount {
            flex: 1.5;
            min-width: 100px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            text-align: center;
            outline: none;
        }

        .custom-amount:focus {
            border-color: #f43f5e;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            background: #f8fafc;
            outline: none;
            color: #1e293b;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #94a3b8;
            background: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .recurrent-block {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 14px;
            margin: 22px 0;
            cursor: pointer;
            border: 2px solid #e2e8f0;
        }

        .recurrent-block:hover {
            border-color: #cbd5e1;
        }

        .recurrent-block input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #f43f5e;
            cursor: pointer;
        }

        .recurrent-block .recurrent-text {
            font-size: 14px;
            color: #334155;
        }

        .recurrent-block .recurrent-text strong {
            color: #e11d48;
        }

        .recurrent-block .recurrent-text small {
            color: #64748b;
            display: block;
        }

        .donate-btn {
            width: 100%;
            padding: 18px;
            background: #f43f5e;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 6px;
        }

        .donate-btn:hover {
            background: #e11d48;
        }

        .secure-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
                border-radius: 24px;
            }
            h1 {
                font-size: 22px;
            }
            .amount-btn {
                padding: 10px 6px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-icon">
            <span>&#10084;</span>
        </div>

        <h1>Помогите детям</h1>
        <p class="subtitle">Ваше пожертвование поможет обеспечить лечение и заботу детям</p>

        <div class="amount-selector">
            <button class="amount-btn" data-amount="100">100 руб</button>
            <button class="amount-btn" data-amount="300">300 руб</button>
            <button class="amount-btn active" data-amount="500">500 руб</button>
            <button class="amount-btn" data-amount="1000">1000 руб</button>
            <input type="number" class="custom-amount" placeholder="Своя сумма" min="1">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ivan@example.com">
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="phone" placeholder="+7 900 123-45-67">
        </div>

        <div class="form-group">
            <label>ФИО</label>
            <input type="text" id="name" placeholder="Иванов Иван Иванович">
        </div>

        <div class="form-group">
            <label>Комментарий</label>
            <textarea id="comment" placeholder="По желанию..."></textarea>
        </div>

        <label class="recurrent-block">
            <input type="checkbox" id="recurrent">
            <span class="recurrent-text">
                Сделать платёж <strong>ежемесячным</strong>
                <small>Средства будут списываться раз в месяц</small>
            </span>
        </label>

        <button class="donate-btn" id="checkout">Пожертвовать</button>

        <div class="secure-note">
            Безопасный платёж через CloudPayments
        </div>
    </div>

    <script>
        var widget = new cp.CloudPayments();

        var amountButtons = document.querySelectorAll('.amount-btn');
        var customAmountInput = document.querySelector('.custom-amount');
        var selectedAmount = 500;

        amountButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                amountButtons.forEach(function(b) { b.classList.remove('active'); });
                customAmountInput.classList.remove('active');
                customAmountInput.value = '';
                btn.classList.add('active');
                selectedAmount = parseInt(btn.getAttribute('data-amount'));
            });
        });

        customAmountInput.addEventListener('focus', function() {
            amountButtons.forEach(function(b) { b.classList.remove('active'); });
            customAmountInput.classList.add('active');
            selectedAmount = parseInt(customAmountInput.value) || 0;
        });

        customAmountInput.addEventListener('input', function() {
            var val = parseInt(customAmountInput.value);
            if (!isNaN(val) && val > 0) {
                selectedAmount = val;
                amountButtons.forEach(function(b) { b.classList.remove('active'); });
                customAmountInput.classList.add('active');
            }
        });

        document.querySelector('#checkout').onclick = function() {
            if (selectedAmount <= 0) {
                alert('Выберите сумму пожертвования.');
                return;
            }

            widget.start({
                publicId: 'pk_8f2b672d45ba2887ad7471e4c5a7f',
                description: 'Благотворительное пожертвование',
                amount: selectedAmount,
                currency: 'RUB',
                invoiceId: 'donation_' + Date.now(),
                accountId: document.getElementById('email').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                data: {
                    CloudPayments: {
                        recurrent: document.getElementById('recurrent').checked
                            ? { interval: 'Month', period: 1 }
                            : null
                    }
                }
            });
        };
    </script>

</body>
</html>
